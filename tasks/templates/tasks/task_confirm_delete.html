{% extends 'tasks/base.html' %}
{% block content %}
<div class="card" style="max-width:460px; margin:60px auto; text-align:center;">
    <div style="font-size:2.5rem; margin-bottom:10px;">⚠️</div>
    <h2>Delete "{{ task.title }}"?</h2>
    <p style="color:var(--text-dim); margin-bottom:22px;">This action cannot be undone.</p>
    <form method="post" style="display:flex; gap:10px; justify-content:center;">
        {% csrf_token %}
        <button class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
