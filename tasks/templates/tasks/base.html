<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Task Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg1: #0f0c29;
    --bg2: #302b63;
    --bg3: #24243e;
    --accent1: #7f5af0;
    --accent2: #2cb67d;
    --accent3: #ff8906;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --text: #e4e4f0;
    --text-dim: #a0a0c0;
  }
  body {
    font-family: 'Poppins', system-ui, sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
  }
  body::before {
    content:"";
    position:fixed; inset:0;
    background:
      radial-gradient(circle at 15% 20%, rgba(127,90,240,0.25), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(44,182,125,0.2), transparent 40%);
    pointer-events:none; z-index:0;
  }
  nav {
    position:relative; z-index:2;
    display:flex; justify-content:space-between; align-items:center;
    padding: 16px 32px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--glass-border);
    flex-wrap:wrap;
  }
  nav .left { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  nav a.brand {
    color:#fff; font-size:1.4rem; font-weight:800; text-decoration:none;
    background: linear-gradient(90deg, #7f5af0, #2cb67d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display:flex; align-items:center; gap:8px;
  }
  nav .right { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  nav .right span {
    font-size:0.9rem; color:var(--text-dim);
    background: var(--glass);
    padding:6px 14px; border-radius:20px;
    border:1px solid var(--glass-border);
  }
  .btn {
    display:inline-block;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:0.9rem;
    font-weight:600;
    text-decoration:none;
    font-family:inherit;
    transition: all 0.25s cubic-bezier(.4,0,.2,1);
  }
  .btn-primary {
    background: linear-gradient(135deg, #7f5af0, #6246ea);
    color:#fff;
    box-shadow: 0 4px 20px rgba(127,90,240,0.4);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(127,90,240,0.6); }
  .btn-secondary { background: var(--glass); color:var(--text); border:1px solid var(--glass-border); }
  .btn-secondary:hover { background: rgba(255,255,255,0.12); }
  .btn-danger { background: linear-gradient(135deg, #ff5470, #e0344b); color:#fff; }
  .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,84,112,0.5); }
  .btn-outline { background:transparent; border:1px solid var(--glass-border); color:var(--text); }
  .btn-outline:hover { background: var(--glass); }
  .btn-sm { padding:7px 14px; font-size:0.8rem; }

  .container {
    position:relative; z-index:1;
    max-width: 1200px;
    margin: 32px auto;
    padding: 0 20px;
  }
  .card {
    background: var(--glass);
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .alert {
    background: rgba(44,182,125,0.15);
    border: 1px solid rgba(44,182,125,0.4);
    color:#7ce3b3;
    padding:12px 18px;
    border-radius:10px;
    margin-bottom:18px;
    font-size:0.9rem;
  }
  h2 { margin-bottom:18px; font-weight:700; letter-spacing:-0.5px; }

  form p { margin-bottom:16px; }
  label { display:block; margin-bottom:6px; font-weight:600; font-size:0.85rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; }
  input, select, textarea {
    width:100%;
    padding:12px 14px;
    background: rgba(255,255,255,0.05);
    border:1px solid var(--glass-border);
    border-radius:10px;
    font-size:0.95rem;
    font-family: inherit;
    color: var(--text);
  }
  input::placeholder, textarea::placeholder { color: #6b6b8a; }
  input:focus, select:focus, textarea:focus {
    outline:none; border-color:#7f5af0; box-shadow:0 0 0 4px rgba(127,90,240,0.2);
  }
  select option { background: #24243e; color: var(--text); }

  ::-webkit-scrollbar { width:8px; }
  ::-webkit-scrollbar-thumb { background: rgba(127,90,240,0.5); border-radius:10px; }

  @media (max-width: 600px) {
    nav { flex-direction:column; align-items:flex-start; gap:10px; padding:14px 18px; }
    .container { margin:16px auto; }
    .card { padding:18px; }
  }
</style>
</head>
<body>
<nav>
    <div class="left">
        <a class="brand" href="{% url 'dashboard' %}"> TaskFlow</a>
        {% if user.is_authenticated and user.is_staff or user.is_superuser %}
            <a href="{% url 'employee_list' %}" class="btn btn-outline btn-sm">👥 Employees</a>
        {% endif %}
    </div>
    {% if user.is_authenticated %}
        <div class="right">
            <span>👤 {{ user.username }}</span>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button class="btn btn-outline btn-sm">Logout</button>
            </form>
        </div>
    {% endif %}
</nav>
<div class="container">
    {% for message in messages %}
        <div class="alert">✅ {{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
