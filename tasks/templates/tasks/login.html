{% extends 'tasks/base.html' %}
{% block content %}
<div class="card" style="max-width:420px; margin:60px auto;">
    <div style="text-align:center; font-size:2.2rem; margin-bottom:6px;"></div>
    <h2 style="text-align:center;">Welcome Back</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" style="width:100%; margin-top:10px;">Login</button>
    </form>
    <p style="margin-top:16px; font-size:0.9rem; text-align:center; color:var(--text-dim);">
        No account? <a href="{% url 'signup' %}" style="color:#7f5af0;">Sign up</a>
    </p>
</div>
{% endblock %}
